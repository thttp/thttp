name: Metrics
on:
  workflow_dispatch:
  schedule: [{cron: "0 * * * *"}]
jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: General
        uses: lowlighter/metrics@latest
        with:
          user: thttp
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: .github/plugins/github-metrics.svg
          base: header
          base_indepth: yes

      - name: Repositories
        uses: lowlighter/metrics@latest
        with:
          user: thttp
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: .github/plugins/metrics.plugin.repositories.svg
          base: ""
          plugin_repositories: yes
          plugin_repositories_featured: thttp/LinkFlow, thttp/flyio-multi-stack-deploy

      - name: Isocalendar
        uses: lowlighter/metrics@latest
        with:
          user: thttp
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: .github/plugins/metrics.plugin.isocalendar.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

      - name: Notable
        uses: lowlighter/metrics@latest
        with:
          user: thttp
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: .github/plugins/metrics.plugin.notable.svg
          base: ""
          plugin_notable: yes

      - name: RSS
        uses: lowlighter/metrics@latest
        with:
          user: thttp
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: .github/plugins/metrics.plugin.rss.svg
          base: ""
          plugin_rss: yes
          plugin_rss_source: https://news.ycombinator.com/rss
          plugin_rss_limit: 4

      - name: Music
        uses: lowlighter/metrics@latest
        with:
          user: thttp
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: .github/plugins/metrics.plugin.music.svg
          base: ""
          plugin_music: yes
          plugin_music_provider: lastfm
          plugin_music_mode: recent
          plugin_music_token: ${{ secrets.LASTFM_TOKEN }}
          plugin_music_user: thttp
          plugin_music_limit: 5

      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          user: thttp
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: .github/plugins/metrics.plugin.languages.svg
          base: ""
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_categories: data, markup, programming, prose
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_other: yes
