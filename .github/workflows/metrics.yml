name: Metrics

on:
  workflow_dispatch:

jobs:
  general:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: General metrics
        uses: lowlighter/metrics@latest
        with:
          user: thttp
          token: ${{ secrets.GITHUB_TOKEN }}

          filename: .github/plugins/github-metrics.svg

          base: header
          base_indepth: yes

  repositories:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Featured repository
        uses: lowlighter/metrics@latest
        with:
          user: thttp
          token: ${{ secrets.GITHUB_TOKEN }}

          filename: .github/plugins/metrics.plugin.repositories.svg

          base: ""

          plugin_repositories: yes
          plugin_repositories_featured: thttp/LinkFlow, thttp/flyio-multi-stack-deploy

  isocalendar:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Isocalendar
        uses: lowlighter/metrics@latest
        with:
          user: thttp
          token: ${{ secrets.GITHUB_TOKEN }}

          filename: .github/plugins/metrics.plugin.isocalendar.svg

          base: ""

          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

  notable:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Notable contributions
        uses: lowlighter/metrics@latest
        with:
          user: thttp
          token: ${{ secrets.GITHUB_TOKEN }}

          filename: .github/plugins/metrics.plugin.notable.svg

          base: ""

          plugin_notable: yes

  activity:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: read
      pull-requests: read

    steps:
      - name: Recent activity
        uses: lowlighter/metrics@v3.34
        with:
          user: thttp
          token: ${{ secrets.GITHUB_TOKEN }}

          filename: .github/plugins/metrics.plugin.activity.svg

          base: ""

          plugin_activity: true
          plugin_activity_limit: 8
          plugin_activity_load: 300
          plugin_activity_days: 90
          plugin_activity_visibility: public
          plugin_activity_timestamps: false
          plugin_activity_filter: issue,pr,release,push,review,star,fork

  rss:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: News from Hacker News
        uses: lowlighter/metrics@latest
        with:
          user: thttp
          token: ${{ secrets.GITHUB_TOKEN }}

          filename: .github/plugins/metrics.plugin.rss.svg

          base: ""

          plugin_rss: true
          plugin_rss_source: https://news.ycombinator.com/rss
          plugin_rss_limit: 4

  music:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Music playlist
        uses: lowlighter/metrics@latest
        with:
          user: thttp
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: .github/plugins/metrics.plugin.music.svg
          base: ""
          plugin_music: yes
          plugin_music_provider: spotify
          plugin_music_mode: playlist
          plugin_music_playlist: https://open.spotify.com/embed/playlist/3C0rLVZ8CCsDvtWiWCkf3l?utm_source=generator&theme=0
          plugin_music_limit: 5
